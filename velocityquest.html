<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Racer RPG - Idle Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: white; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: 10; }
        .menu { background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 15px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; border: 2px solid #444; min-width: 300px; }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 18px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none; }
        #idle-popup { display: none; background: #2c3e50; border: 3px solid #f1c40f; z-index: 20; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 24px; margin: 8px; cursor: pointer; font-size: 16px; border-radius: 5px; transition: 0.2s; }
        .btn:hover { background: #2980b9; transform: scale(1.05); }
        .exit-btn { background: #e74c3c; position: absolute; top: 100px; left: 20px; display: none; }
        #world-map { display: block; }
        #shop { display: none; }
        .stat-box { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="idle-popup" class="menu">
            <h2>Welcome Back!</h2>
            <p>Your vehicles kept racing while you were away.</p>
            <p>You earned: <span id="idle-points-earned" class="stat-box">0</span> Points</p>
            <button class="btn" onclick="closeIdlePopup()">Awesome!</button>
        </div>

        <div id="world-map" class="menu">
            <h1>🌍 Global Racer RPG</h1>
            <button class="btn" onclick="startRace('Tokyo', 0x111122)">Japan (Neon City)</button>
            <button class="btn" onclick="startRace('Amazon', 0x1b5e20)">Brazil (Jungle)</button>
            <br>
            <button class="btn" style="background:#8e44ad" onclick="openShop()">🛒 RPG Upgrade Shop</button>
        </div>

        <div id="shop" class="menu">
            <h1>Global Garage</h1>
            <p>Balance: <span id="shop-points" class="stat-box">0</span> Points</p>
            <button class="btn" onclick="buyUpgrade('speed')">Boost Engine (50 pts)</button><br>
            <button class="btn" onclick="buyUpgrade('color')">Custom Paint (20 pts)</button><br>
            <button class="btn" style="background:#7f8c8d" onclick="closeShop()">Back to Map</button>
        </div>

        <div id="hud">
            Points: <span id="points-display" class="stat-box">0</span><br>
            Engine Level: <span id="level-display" class="stat-box">1</span>
        </div>
        <button id="exit-btn" class="btn exit-btn" onclick="stopRace()">🏁 Finish Race</button>
    </div>

    <script>
        // --- GAME DATA & STORAGE ---
        let gameData = {
            points: parseInt(localStorage.getItem('racerPoints')) || 0,
            engineLevel: parseInt(localStorage.getItem('racerLevel')) || 1,
            speed: 1,
            isRacing: false
        };

        // --- IDLE LOGIC ---
        function calculateIdlePoints() {
            const lastPlayed = localStorage.getItem('lastPlayedTime');
            if (lastPlayed) {
                const currentTime = Date.now();
                const timePassedInSeconds = (currentTime - lastPlayed) / 1000;
                const hoursPassed = timePassedInSeconds / 3600;
                
                // 100 points per hour
                const earned = Math.floor(hoursPassed * 100);
                
                if (earned > 0) {
                    gameData.points += earned;
                    document.getElementById('idle-points-earned').innerText = earned;
                    document.getElementById('idle-popup').style.display = 'block';
                    document.getElementById('world-map').style.display = 'none';
                    saveGame();
                }
            }
        }

        function saveGame() {
            localStorage.setItem('racerPoints', gameData.points);
            localStorage.setItem('racerLevel', gameData.engineLevel);
            localStorage.setItem('lastPlayedTime', Date.now());
            updateUI();
        }

        function closeIdlePopup() {
            document.getElementById('idle-popup').style.display = 'none';
            document.getElementById('world-map').style.display = 'block';
        }

        // --- 3D SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshPhongMaterial({color: 0x3498db}));
        car.add(body);
        scene.add(car);
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        camera.position.set(0, 3, 6);
        camera.lookAt(car.position);

        // --- RACING ---
        function startRace(location, color) {
            gameData.isRacing = true;
            document.getElementById('world-map').style.display = 'none';
            document.getElementById('exit-btn').style.display = 'block';
            scene.background = new THREE.Color(color);
            
            gameData.pointTimer = setInterval(() => {
                gameData.points += 5;
                saveGame();
            }, 1000);
        }

        function stopRace() {
            gameData.isRacing = false;
            clearInterval(gameData.pointTimer);
            document.getElementById('world-map').style.display = 'block';
            document.getElementById('exit-btn').style.display = 'none';
            scene.background = new THREE.Color(0x111111);
            saveGame();
        }

        function openShop() {
            document.getElementById('world-map').style.display = 'none';
            document.getElementById('shop').style.display = 'block';
            document.getElementById('shop-points').innerText = gameData.points;
        }

        function closeShop() {
            document.getElementById('shop').style.display = 'none';
            document.getElementById('world-map').style.display = 'block';
        }

        function buyUpgrade(type) {
            if(type === 'speed' && gameData.points >= 50) {
                gameData.points -= 50;
                gameData.engineLevel += 1;
                saveGame();
                document.getElementById('shop-points').innerText = gameData.points;
            }
        }

        function updateUI() {
            document.getElementById('points-display').innerText = gameData.points;
            document.getElementById('level-display').innerText = gameData.engineLevel;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gameData.isRacing) {
                car.position.x = Math.sin(Date.now() * 0.002) * 2;
            } else {
                car.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        // Initialize Game
        calculateIdlePoints();
        updateUI();
        animate();
        setInterval(saveGame, 10000); // Auto-save every 10 seconds

    </script>
</body>
</html>
