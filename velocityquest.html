<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Quest: Level Up!</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #111; border: 4px solid #444; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 10; }
        .active { display: flex; }

        .hud { position: fixed; top: 10px; left: 10px; z-index: 5; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .lvl-tag { color: #ffff00; font-weight: bold; font-size: 20px; }

        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 8px; }
        button:hover { background: #0f0; color: #000; }
        input { font-size: 24px; width: 150px; text-align: center; margin: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="hud">
    <div class="lvl-tag">RACE LEVEL: <span id="h-level">1</span></div>
    <div style="margin: 5px 0;">Power: <span id="h-power">0</span> / <span id="h-cost">10</span></div>
    <div>🥈:<span id="h-silver">0</span> 🥇:<span id="h-gold">0</span> 🏆:<span id="h-platinum">0</span></div>
</div>

<div id="screen-menu" class="overlay active">
    <h1>VELOCITY QUEST</h1>
    <button onclick="game.setState('OVERWORLD')">ENTER WORLD</button>
</div>

<div id="screen-guessing" class="overlay">
    <h2>HACKING TERMINAL</h2>
    <div id="hack-hearts" style="font-size:30px;"></div>
    <p id="feedback">Multiples of 10</p>
    <input type="number" id="guess-input">
    <button onclick="game.submitGuess()">INJECT DATA</button>
    <button onclick="game.setState('OVERWORLD')" style="border-color:#555; font-size:12px;">EXIT</button>
</div>

<div id="screen-math" class="overlay">
    <h2>ENGINEERING LAB</h2>
    <h1 id="math-problem"></h1>
    <input type="number" id="math-input">
    <button onclick="game.submitMath()">CALCULATE</button>
    <button onclick="game.setState('OVERWORLD')" style="border-color:#555; font-size:12px;">EXIT</button>
</div>

<div id="screen-racing" class="overlay">
    <h1 id="race-level-display">LEVEL 1</h1>
    <div style="font-size: 25px;">Distance: <span id="race-dist">0</span> / 5000m</div>
    <p>Use Left/Right Arrows to Steer!</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const game = {
    state: 'MENU',
    canvas: document.getElementById('gameCanvas'),
    ctx: null,
    // NEW: Added currentLevel to save data
    saveData: { gold: 0, silver: 0, platinum: 0, power: 0, currentLevel: 1 },
    
    player: { x: 400, y: 300, size: 15, speed: 5, color: '#00ffff' },
    keys: {},
    zones: [
        { name: 'MATH', color: 'rgba(0, 0, 255, 0.4)', x: 100, y: 100, w: 120, h: 120, label: 'Math Lab' },
        { name: 'GUESSING', color: 'rgba(255, 255, 0, 0.4)', x: 580, y: 100, w: 120, h: 120, label: 'Hacking' },
        { name: 'RACING', color: 'rgba(255, 0, 0, 0.4)', x: 340, y: 440, w: 120, h: 120, label: 'RACE TRACK' }
    ],

    hack: { secret: 0, attempts: 0 },
    math: { a: 0, b: 0, ans: 0 },
    race: { distance: 0, speed: 0, playerX: 0, roadOffset: 0 },

    init: function() {
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = 800; this.canvas.height = 600;
        
        window.addEventListener('keydown', (e) => this.keys[e.code] = true);
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);

        const stored = localStorage.getItem('vQuestSaveV2');
        if (stored) this.saveData = JSON.parse(stored);
        this.updateHUD();
        this.loop();
    },

    updateHUD: function() {
        document.getElementById('h-level').innerText = this.saveData.currentLevel;
        document.getElementById('h-power').innerText = this.saveData.power;
        document.getElementById('h-gold').innerText = this.saveData.gold;
        document.getElementById('h-platinum').innerText = this.saveData.platinum;
        // Calculation: Power needed = Level * 10
        document.getElementById('h-cost').innerText = this.saveData.currentLevel * 10;
    },

    save: function() {
        localStorage.setItem('vQuestSaveV2', JSON.stringify(this.saveData));
        this.updateHUD();
    },

    setState: function(s) {
        // Power Check for Racing
        if (s === 'RACING') {
            const powerNeeded = this.saveData.currentLevel * 10;
            if (this.saveData.power < powerNeeded) {
                alert(`LOCKED! You need ${powerNeeded} Power for Level ${this.saveData.currentLevel}.\nGo to the Math Lab!`);
                return;
            }
            document.getElementById('race-level-display').innerText = "LEVEL " + this.saveData.currentLevel;
            this.race.distance = 0;
            this.race.playerX = 0;
        }

        this.state = s;
        document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
        if (s !== 'OVERWORLD') document.getElementById('screen-' + s.toLowerCase()).classList.add('active');
        
        if (s === 'GUESSING') this.initHack();
        if (s === 'MATH') this.newMath();
    },

    // --- SYSTEMS ---
    updateOverworld: function() {
        if (this.keys['ArrowUp']) this.player.y -= this.player.speed;
        if (this.keys['ArrowDown']) this.player.y += this.player.speed;
        if (this.keys['ArrowLeft']) this.player.x -= this.player.speed;
        if (this.keys['ArrowRight']) this.player.x += this.player.speed;

        this.zones.forEach(z => {
            if (this.player.x > z.x && this.player.x < z.x + z.w &&
                this.player.y > z.y && this.player.y < z.y + z.h) {
                this.player.x = 400; this.player.y = 300; 
                this.setState(z.name);
            }
        });
    },

    newMath: function() {
        this.math.a = Math.floor(Math.random() * 20) + (this.saveData.currentLevel * 2);
        this.math.b = Math.floor(Math.random() * 20);
        this.math.ans = this.math.a + this.math.b;
        document.getElementById('math-problem').innerText = `${this.math.a} + ${this.math.b} = ?`;
    },

    submitMath: function() {
        if (parseInt(document.getElementById('math-input').value) === this.math.ans) {
            this.saveData.power += 5;
            this.save();
            this.newMath();
        }
        document.getElementById('math-input').value = "";
    },

    initHack: function() {
        this.hack.secret = (Math.floor(Math.random() * 10) + 1) * 10;
        this.hack.attempts = 0;
        document.getElementById('hack-hearts').innerText = "❤️❤️❤️❤️❤️";
    },

    submitGuess: function() {
        let val = parseInt(document.getElementById('guess-input').value);
        this.hack.attempts++;
        if (val === this.hack.secret) {
            alert("HACK COMPLETE! +1 Gold Trophy");
            this.saveData.gold++; this.save(); this.setState('OVERWORLD');
        } else {
            document.getElementById('hack-hearts').innerText = "❤️".repeat(5 - this.hack.attempts);
            if (this.hack.attempts >= 5) this.setState('OVERWORLD');
        }
        document.getElementById('guess-input').value = "";
    },

    updateRace: function() {
        // Speed increases with Level
        this.race.speed = 10 + this.saveData.currentLevel;
        this.race.distance += Math.floor(this.race.speed);
        this.race.roadOffset = (this.race.roadOffset + this.race.speed) % 100;
        document.getElementById('race-dist').innerText = this.race.distance;

        if (this.keys['ArrowLeft']) this.race.playerX -= 8;
        if (this.keys['ArrowRight']) this.race.playerX += 8;

        if (this.race.distance > 5000) {
            alert(`LEVEL ${this.saveData.currentLevel} CLEARED!`);
            this.saveData.currentLevel++;
            this.saveData.platinum++;
            this.save();
            this.setState('OVERWORLD');
        }
    },

    draw: function() {
        this.ctx.clearRect(0,0,800,600);
        if (this.state === 'OVERWORLD') {
            this.zones.forEach(z => {
                this.ctx.fillStyle = z.color;
                this.ctx.fillRect(z.x, z.y, z.w, z.h);
                this.ctx.fillStyle = "#fff";
                this.ctx.fillText(z.label, z.x + 20, z.y + 60);
            });
            this.ctx.fillStyle = this.player.color;
            this.ctx.beginPath(); this.ctx.arc(this.player.x, this.player.y, 15, 0, 7); this.ctx.fill();
        } 
        else if (this.state === 'RACING') {
            this.ctx.fillStyle = "#111"; this.ctx.fillRect(0,0,800,600);
            for(let i=0; i<600; i+=20) {
                let w = i * 2; let y = 600 - i;
                this.ctx.fillStyle = (Math.floor((i+this.race.roadOffset)/50)%2==0) ? "#333" : "#444";
                this.ctx.fillRect(400 - w/2 + this.race.playerX, y, w, 20);
            }
            this.ctx.fillStyle = "red"; this.ctx.fillRect(385, 520, 30, 50); // Simple Car
        }
    },

    loop: function() {
        if (this.state === 'OVERWORLD') this.updateOverworld();
        if (this.state === 'RACING') this.updateRace();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
};

window.onload = () => game.init();
</script>
</body>
</html>
